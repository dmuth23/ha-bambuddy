name: TEST WORKFLOW

on:
  workflow_dispatch:

jobs:
  check-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Check if beta tag exists
        run: |
          TOKEN=$(curl -s "https://ghcr.io/token?scope=repository:maziggy/bambuddy:pull" \
            | jq -r '.token')

          echo "=== HTTP STATUS :beta ==="
          curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/beta" \
            | head -5

          echo ""
          echo "=== DIGEST :beta ==="
          curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/beta" \
            | grep -i "docker-content-digest"

          echo ""
          echo "=== DIGEST :latest ZUM VERGLEICH ==="
          curl -sI -H "Authorization: Bearer $TOKEN" \
            -H "Accept: application/vnd.docker.distribution.manifest.list.v2+json" \
            "https://ghcr.io/v2/maziggy/bambuddy/manifests/latest" \
            | grep -i "docker-content-digest"
